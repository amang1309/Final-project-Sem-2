<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gada Electronics | Sign In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="signin">
  <header id="site-header" class="site-header"></header>

  <main class="container">
    <h1>Sign In</h1>
    <p class="muted">Access your orders and saved items.</p>

    <form id="signin-form" class="auth-form" novalidate>
      <div id="form-message" class="form-message"></div>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required />

      <div style="margin-top:10px;">
        <label style="display:flex; align-items:center; gap:8px; font-weight:400;">
          <input type="checkbox" name="remember" /> Remember me
        </label>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn">Sign in</button>
        <a href="signup.html">Need an account?</a>
      </div>
    </form>
  </main>

  <footer class="footer">
    <div class="container wrap">&copy; 2025 Gada Electronics. All rights reserved.</div>
  </footer>

  <script src="products.js"></script>
  <script src="storage.js"></script>
  <script src="header.js"></script>
  <script src="signin.js"></script>
</body>
</html>
