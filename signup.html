<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gada Electronics | Sign Up</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="signup">
  <header id="site-header" class="site-header"></header>

  <main class="container">
    <h1>Create your account</h1>
    <p class="muted">Join Gada Electronics to track orders and save your cart.</p>

    <form id="signup-form" class="auth-form" novalidate>
      <div id="form-message" class="form-message"></div>

      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone" placeholder="9876543210" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="At least 8 characters" required />

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm" placeholder="Re-enter password" required />

      <div style="margin-top:10px;">
        <label style="display:flex; align-items:center; gap:8px; font-weight:400;">
          <input type="checkbox" name="terms" required /> I agree to the Terms & Privacy Policy
        </label>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn">Sign Up</button>
        <a href="signin.html">Already have an account?</a>
      </div>
    </form>
  </main>

  <footer class="footer">
    <div class="container wrap">&copy; 2025 Gada Electronics. All rights reserved.</div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/header.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
