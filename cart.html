<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gada Electronics | Cart</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="cart">
  <header id="site-header" class="site-header"></header>

  <main class="container">
    <h1>Your Cart</h1>

    <!-- Shown only when the cart has nothing in it -->
    <p id="cart-empty" class="empty-state" style="display:none;">
      Your cart is empty. <a href="product.html">Browse products</a> to add something.
    </p>

    <!-- Filled in by cart.js with whatever is actually in localStorage -->
    <div class="card" id="cart-table-wrap" style="padding:0; overflow:hidden;">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Subtotal</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cart-body"></tbody>
      </table>
    </div>

    <div class="card" style="margin-top:16px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
      <div>
        <p><strong>Total: <span id="cart-total">₹0</span></strong></p>
        <p class="muted" style="margin-top:-6px;">Taxes & shipping calculated at checkout.</p>
      </div>
      <button id="checkout-btn" class="btn" type="button">Checkout</button>
    </div>
  </main>

  <footer class="footer">
    <div class="container wrap">&copy; 2025 Gada Electronics. All rights reserved.</div>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="js/products.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/header.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
